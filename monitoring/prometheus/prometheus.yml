global:
  scrape_interval: 5s          # быстро для демо
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: demo-app
    static_configs:
      - targets: ['demo-app:9000']
