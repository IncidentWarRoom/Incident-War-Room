services:
  incident-service:
    build: ./incident-service
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REPORT_SERVICE_URL=http://report-service:8000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      report-service:
        condition: service_healthy

  report-service:
    build: ./report-service
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  demo-app:
    build: ./demo-app
    restart: unless-stopped
    ports:
      - "9000:9000"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - demo-app

  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    depends_on:
      - incident-service

  frontend:
    build:
      context: ./frontend
      args:
        VITE_INCIDENT_API_BASE: http://localhost:8080
        VITE_REPORT_API_BASE: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - incident-service

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./incident-service/migration/0001_init_up.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - ./incident-service/migration/0002_reporting_fields_up.sql:/docker-entrypoint-initdb.d/0002_reporting_fields.sql:ro
      - ./incident-service/migration/0003_event_media_up.sql:/docker-entrypoint-initdb.d/0003_event_media.sql:ro
      - ./incident-service/migration/0004_event_image_up.sql:/docker-entrypoint-initdb.d/0004_event_image.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} psql -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c '\\q' -q"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
