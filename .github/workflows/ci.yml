name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: incident-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: incident-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: incident-service/go.mod
          cache-dependency-path: incident-service/go.sum

      - name: gofmt
        run: test -z "$(gofmt -l ./internal/ ./cmd/)"

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  python:
    name: report-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: report-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: report-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: pytest
        run: pytest -m "not integration"

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Provide env for compose
        run: cp .env.example .env

      - name: Validate compose file
        run: docker compose config -q

      - name: Build images
        run: docker compose build
